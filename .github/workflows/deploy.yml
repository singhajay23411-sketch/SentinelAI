name: 🚀 Deploy SentinelAI to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'playstore-service/**'
      - 'frontend/**'

jobs:
  # ───────────────────────────── BACKEND DEPLOY ─────────────────────────────
  deploy-backend:
    name: 🐍 Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'playstore-service/**'

      - name: 🔑 Setup SSH agent
        if: steps.filter.outputs.backend == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📡 Add VM to known hosts
        if: steps.filter.outputs.backend == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Pull latest code & restart backend
        if: steps.filter.outputs.backend == 'true'
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e
            echo "=== Pulling latest code ==="
            cd ~/SentinelAI
            git fetch origin main
            git reset --hard origin/main

            echo "=== Installing Python dependencies ==="
            source ~/venv/bin/activate
            pip install -r playstore-service/requirements.txt -q

            echo "=== Restarting SentinelAI service ==="
            sudo systemctl restart sentinelai

            echo "=== Verifying service is running ==="
            sleep 2
            sudo systemctl is-active sentinelai && echo "✅ sentinelai is running!" || echo "❌ sentinelai failed to start"

            echo "=== Health check ==="
            curl -s http://127.0.0.1:8000/health
          EOF

  # ─────────────────────────── FRONTEND DEPLOY ──────────────────────────────
  deploy-frontend:
    name: ⚛️  Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: 🟢 Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: 🏗️  Build production bundle
        if: steps.filter.outputs.frontend == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: http://${{ secrets.VM_HOST }}
        run: npm run build

      - name: 🔑 Setup SSH agent
        if: steps.filter.outputs.frontend == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📡 Add VM to known hosts
        if: steps.filter.outputs.frontend == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload dist to Oracle VM
        if: steps.filter.outputs.frontend == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/sentinelai/

      - name: 🔄 Reload Nginx
        if: steps.filter.outputs.frontend == 'true'
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "sudo systemctl reload nginx && echo '✅ Nginx reloaded'"

      - name: 🌐 Smoke test website
        if: steps.filter.outputs.frontend == 'true'
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VM_HOST }}/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Website is live at http://${{ secrets.VM_HOST }}/"
          else
            echo "❌ Website returned $STATUS"
            exit 1
          fi



